<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mining Dashboard v3</title>
<link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<style>
:root {
  --bg: #0d1117; --card: #161b22; --border: #30363d;
  --text: #c9d1d9; --dim: #8b949e; --accent: #3fb950;
  --warn: #d2991d; --danger: #f85149; --info: #58a6ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }
a { color: var(--info); text-decoration: none; }

/* Nav */
.navbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; align-items: center; gap: 16px; }
.navbar .brand { font-weight: 700; font-size: 1.1rem; }
.nav-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.nav-dot.online { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
.nav-dot.offline { background: var(--danger); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.nav-stat { font-size: 0.8rem; color: var(--dim); }
.nav-stat strong { color: var(--text); }

/* Miner Cards */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 12px; padding: 16px 20px; }
.miner-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.miner-card .card-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
.miner-card .card-head .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.miner-card .card-head .status-dot.online { background: var(--accent); }
.miner-card .card-head .status-dot.offline { background: var(--danger); }
.miner-card .card-head .name { font-weight: 600; }
.miner-card .card-head .type { font-size: 0.7rem; background: var(--border); padding: 2px 8px; border-radius: 4px; color: var(--dim); text-transform: uppercase; }
.miner-card .card-head .ip { font-size: 0.75rem; color: var(--dim); font-family: monospace; }
.miner-card .card-head .uptime { margin-left: auto; font-size: 0.75rem; color: var(--dim); font-family: monospace; }
.miner-card .card-body { padding: 12px 16px; }
.miner-card .card-actions { display: flex; gap: 6px; padding: 0 16px 12px; }
.miner-card .card-actions .btn { font-size: 0.7rem; padding: 3px 14px; font-weight: 500; }

/* Metrics: 2-column grid */
.metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.metric { background: rgba(255,255,255,0.02); border-radius: 6px; padding: 8px 12px; }
.metric .m-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--dim); }
.metric .m-value { font-size: 1.05rem; font-weight: 700; }
.metric .m-sub { font-size: 0.65rem; color: var(--dim); margin-top: 2px; }
.metric.warn .m-value { color: var(--warn); }
.metric.ok .m-value { color: var(--accent); }
.metric.bad .m-value { color: var(--danger); }
.metric.info .m-value { color: var(--info); }

/* History */
.section { padding: 0 20px; margin-bottom: 16px; }
.section-hd { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.section-hd .title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); font-weight: 600; }
.section-hd::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.range-btns { display: flex; gap: 4px; }
.range-btns button { font-size: 0.7rem; padding: 3px 12px; background: transparent; border: 1px solid var(--border); color: var(--dim); border-radius: 4px; cursor: pointer; }
.range-btns button.active { background: #1b3a1b; border-color: var(--accent); color: var(--accent); }
.range-btns button:hover:not(.active) { background: var(--border); }

.charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 12px; }
.chart-box { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
.chart-box .chart-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); margin-bottom: 8px; font-weight: 600; }

/* Syslog */
.log-panel { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 0; max-height: 240px; overflow-y: auto; }
.log-line { padding: 4px 14px; font-size: 0.7rem; font-family: 'Consolas', monospace; border-bottom: 1px solid rgba(255,255,255,0.02); display: flex; gap: 8px; }
.log-line .log-time { color: var(--dim); flex-shrink: 0; width: 70px; }
.log-line .log-sev { flex-shrink: 0; width: 40px; font-weight: 600; }
.log-line .log-msg { flex: 1; }
.log-line.log-ok .log-sev { color: var(--accent); }
.log-line.log-warning .log-sev { color: var(--warn); }
.log-line.log-danger .log-sev { color: var(--danger); }
.log-line.log-info .log-sev { color: var(--info); }

.log-summary { display: flex; gap: 24px; padding: 10px 16px; font-size: 0.75rem; }
.log-summary .sum { display: flex; align-items: center; gap: 6px; }
.log-summary .sum .n { font-weight: 700; font-size: 1.1rem; }
.log-summary .sum .n.good { color: var(--accent); }
.log-summary .sum .n.warn { color: var(--warn); }
.log-summary .sum .n.bad { color: var(--danger); }
.log-summary .sum .l { color: var(--dim); }

/* Scrollbar */
.log-panel::-webkit-scrollbar { width: 4px; }
.log-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

@media (max-width: 768px) {
  .cards-grid { grid-template-columns: 1fr; }
  .charts-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav class="navbar">
  <span class="brand">⛏ Mining Dashboard</span>
  <span class="nav-dot online" id="navDot"></span>
  <span class="nav-stat" id="navWorkers">--</span>
  <span class="nav-stat">ASIC <strong id="navAsicHash">--</strong></span>
  <span class="nav-stat">GPU <strong id="navGpuHash">--</strong></span>
  <span class="nav-stat" style="margin-left:auto" id="navTime">--</span>
</nav>

<div class="cards-grid" id="cardsGrid">
  <!-- Cards rendered by JS -->
</div>

<div class="section">
  <div class="section-hd">
    <span class="title">Charts</span>
    <div class="range-btns" id="rangeBtns">
      <button data-h="0.25">15m</button>
      <button data-h="0.5" class="active">30m</button>
      <button data-h="1">1h</button>
      <button data-h="6">6h</button>
      <button data-h="24">1d</button>
    </div>
  </div>
  <div class="charts-grid">
    <div class="chart-box"><div class="chart-title">Hashrate</div><canvas id="cHash" height="180"></canvas></div>
    <div class="chart-box"><div class="chart-title">Temperature</div><canvas id="cTemp" height="180"></canvas></div>
    <div class="chart-box"><div class="chart-title">HW Errors / Hour</div><canvas id="cHw" height="180"></canvas></div>
    <div class="chart-box"><div class="chart-title">Accepted / Rejected</div><canvas id="cShares" height="180"></canvas></div>
  </div>
</div>

<div class="section">
  <div class="section-hd"><span class="title">System Log</span></div>
  <div class="log-summary" id="logSummary"></div>
  <div class="log-panel" id="logPanel"><div class="log-line"><span class="text-secondary">Loading...</span></div></div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
// ---- Init Charts ----
Chart.defaults.color = '#8b949e';
Chart.defaults.borderColor = '#30363d';
Chart.defaults.plugins.legend.labels.color = '#c9d1d9';
document.querySelectorAll('canvas').forEach(c => c.parentElement.style.height = '200px');

function mkChart(id, datasets) {
  return new Chart(document.getElementById(id), {
    type: 'line', data: { labels: [], datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: { x: { ticks: { maxTicksLimit: 8, maxRotation: 0 } }, y: { beginAtZero: false } },
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 10 } } },
      elements: { point: { radius: 0 } },
    }
  });
}
const cHash = mkChart('cHash', [
  { label: 'ASIC GH/s', data: [], borderColor: '#d2991d', tension: 0.2, yAxisID: 'y' },
  { label: 'GPU1 MH/s', data: [], borderColor: '#58a6ff', tension: 0.2, yAxisID: 'y1' },
  { label: 'GPU2 MH/s', data: [], borderColor: '#3fb950', tension: 0.2, yAxisID: 'y1' },
]);
cHash.options.scales.y = { position: 'left', title: { display: true, text: 'GH/s' } };
cHash.options.scales.y1 = { position: 'right', title: { display: true, text: 'MH/s' }, grid: { drawOnChartArea: false } };

const cTemp = mkChart('cTemp', [
  { label: 'ASIC T1', data: [], borderColor: '#ff9800', tension: 0.2 },
  { label: 'ASIC T2', data: [], borderColor: '#ff6b6b', tension: 0.2 },
  { label: 'GPU1', data: [], borderColor: '#58a6ff', tension: 0.2 },
  { label: 'GPU2', data: [], borderColor: '#3fb950', tension: 0.2 },
]);
const cHw = mkChart('cHw', [
  { label: 'ASIC HW/h', data: [], borderColor: '#f85149', tension: 0.2 },
]);
const cShares = mkChart('cShares', [
  { label: 'Acc', data: [], borderColor: '#3fb950', tension: 0.2 },
  { label: 'Rej', data: [], borderColor: '#f85149', tension: 0.2 },
]);

// ---- State ----
let histRange = 0.5;
let lastHw = {};  // {asic: last_hw_total, gpu0: last_hw}
let chartsData = { labels: [], asic_hr: [], gpu1_hr: [], gpu2_hr: [], asic_t1: [], asic_t2: [], gpu1_t: [], gpu2_t: [], hw: [], acc: [], rej: [] };
const MAX_PTS = 100;

// ---- Render Miner Cards ----
function renderCards(asic, gpus) {
  let html = '';

  // ASIC Card
  const a = asic || {};
  const aOnline = a.ghsav > 0;
  const aHwPerH = a.hw_per_hour != null ? a.hw_per_hour.toFixed(1) : '--';
  html += `<div class="miner-card">
    <div class="card-head">
      <span class="status-dot ${aOnline ? 'online' : 'offline'}"></span>
      <span class="name">ASIC Miner</span>
      <span class="type">D1 MINI</span>
      <span class="ip">${a.ip || '192.168.3.5'}</span>
      <span class="uptime">${a.elapsed || '--'}</span>
    </div>
    <div class="card-body">
      <div class="metrics">
        <div class="metric warn"><div class="m-label">Hashrate</div><div class="m-value">${a.ghsav_display || '--'}</div><div class="m-sub">5s: ${a.ghs5s_display || '--'}</div></div>
        <div class="metric ok"><div class="m-label">Accepted</div><div class="m-value">${a.accepted != null ? a.accepted : '--'}</div><div class="m-sub">Rej: ${a.rejected != null ? a.rejected : '--'}</div></div>
        <div class="metric"><div class="m-label">Temp 1/2</div><div class="m-value" style="color:#ff9800">${a.temp1 != null ? a.temp1+'°C' : '--'} / ${a.temp2 != null ? a.temp2+'°C' : '--'}</div></div>
        <div class="metric"><div class="m-label">Fans</div><div class="m-value">${a.fan2 || '--'} / ${a.fan3 || '--'}</div><div class="m-sub">RPM</div></div>
        <div class="metric bad"><div class="m-label">HW Errors</div><div class="m-value">${a.hw_total != null ? a.hw_total : '--'}</div><div class="m-sub">${aHwPerH} /hour</div></div>
        <div class="metric info"><div class="m-label">Reject Rate</div><div class="m-value">${a.reject_pct != null ? a.reject_pct+'%' : '--'}</div></div>
      </div>
    </div>
  </div>`;

  // GPU Cards
  for (let i = 0; i < 2; i++) {
    const g = (gpus && gpus[i]) ? gpus[i] : {};
    const online = g.success && g.hashrate > 0;
    const name = g.gpu_name || `GPU #${i+1}`;
    const algo = g.algorithm || '--';
    const ip = g.host || (i === 0 ? '192.168.3.6' : '192.168.3.2');
    html += `<div class="miner-card">
      <div class="card-head">
        <span class="status-dot ${online ? 'online' : 'offline'}"></span>
        <span class="name">${name}</span>
        <span class="type">${algo}</span>
        <span class="ip">${ip}</span>
        <span class="uptime">${g.uptime_display || '--'}</span>
      </div>
      <div class="card-body">
        <div class="metrics">
          <div class="metric warn"><div class="m-label">Hashrate</div><div class="m-value">${g.hashrate_display || '0 MH/s'}</div><div class="m-sub">Pool: ${g.pool_hashrate_display || '--'}</div></div>
          <div class="metric ok"><div class="m-label">Accepted</div><div class="m-value">${g.accepted != null ? g.accepted : '--'}</div><div class="m-sub">Rej: ${g.rejected != null ? g.rejected : '--'} (${g.reject_pct != null ? g.reject_pct+'%' : '--'})</div></div>
          <div class="metric"><div class="m-label">Temp / Fan</div><div class="m-value" style="color:#ff9800">${g.temp != null ? g.temp+'°C' : '--'} / ${g.fan != null ? g.fan+'%' : '--'}</div></div>
          <div class="metric info"><div class="m-label">Power / Efficiency</div><div class="m-value">${g.power != null ? g.power+'W' : '--'} / ${g.efficiency_display || '--'}</div></div>
          <div class="metric"><div class="m-label">Latency</div><div class="m-value">${g.latency_ms != null ? g.latency_ms+'ms' : '--'}</div></div>
          <div class="metric"><div class="m-label">State</div><div class="m-value">${g.device_state || '--'}</div></div>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn btn-sm" style="border-color:#5c3030;color:#e57373" onclick="gpuAction(${i},'stop')">Stop</button>
        <button class="btn btn-sm" style="border-color:#2e5c30;color:#66bb6a" onclick="gpuAction(${i},'start')">Start</button>
      </div>
    </div>`;
  }
  document.getElementById('cardsGrid').innerHTML = html;
}

// ---- Data Refresh ----
async function refresh() {
  try {
    const [asicR, gpuR, logR] = await Promise.all([
      fetch('/api/status').then(r => r.json()).catch(() => ({})),
      fetch('/api/gpu/status').then(r => r.json()).catch(() => []),
      fetch('/api/syslog').then(r => r.json()).catch(() => ({})),
    ]);

    const asic = asicR.error ? {} : asicR;
    const gpus = Array.isArray(gpuR) ? gpuR : [];

    // Process GPU data
    const gpuData = gpus.map((g, i) => {
      if (!g || !g.success) return { success: false, host: i === 0 ? '192.168.3.6' : '192.168.3.2' };
      const dev = (g.devices || [{}])[0] || {};
      const hr = dev.hashrate || {};
      const alg = Object.keys(hr)[0] || g.algorithm || '';
      const mhs = hr[alg] ? hr[alg] / 1e6 : 0;
      const poolHr = dev.pool_hashrate || {};
      const poolMhs = poolHr[alg] ? poolHr[alg] / 1e6 : 0;
      const mon = dev.monitoring_info || {};
      const sol = (g.solution_stat || {})[alg] || {};
      const acc = sol.accepted || 0;
      const rej = sol.rejected || 0;
      const total = acc + rej;
      const pools = g.pools || {};
      const poolList = pools[alg] || [];
      const pool = poolList[0] || {};
      const latency = pool.average_latency_ms || null;

      return {
        success: true,
        host: g.host || (i === 0 ? '192.168.3.6' : '192.168.3.2'),
        gpu_name: dev.name || gpuR[i]?.gpu_name,
        algorithm: alg.toUpperCase(),
        hashrate: mhs,
        hashrate_display: mhs >= 1000 ? (mhs/1000).toFixed(1)+' GH/s' : mhs.toFixed(1)+' MH/s',
        pool_hashrate_display: poolMhs >= 1000 ? (poolMhs/1000).toFixed(1)+' GH/s' : poolMhs.toFixed(1)+' MH/s',
        accepted: acc, rejected: rej,
        reject_pct: total > 0 ? (rej/total*100).toFixed(1) : '0',
        temp: mon.core_temperature, fan: mon.fan_speed,
        power: mon.power_usage ? mon.power_usage.toFixed(1) : null,
        efficiency_display: g.power_usage && mhs > 0 ? (mhs / g.power_usage * 1000).toFixed(0) + ' kH/W' : '--',
        latency_ms: latency,
        device_state: dev.state,
        uptime_sec: g.uptime || 0,
        uptime_display: formatUptime(g.uptime || 0),
      };
    });

    // Calculate HW per hour
    const now = Date.now();
    let asicHwPerH = null;
    if (asic.hw_total != null) {
      const key = 'asic';
      if (lastHw[key] != null && lastHw[key].ts) {
        const dt = (now - lastHw[key].ts) / 3600000; // hours
        const dh = asic.hw_total - lastHw[key].val;
        asicHwPerH = dt > 0 ? dh / dt : 0;
      }
      lastHw[key] = { ts: now, val: asic.hw_total };
    }

    // Reject rate for ASIC
    const asicTotal = (asic.accepted || 0) + (asic.rejected || 0);
    asic.reject_pct = asicTotal > 0 ? ((asic.rejected || 0) / asicTotal * 100).toFixed(1) : '0';
    asic.hw_per_hour = asicHwPerH;
    asic.ip = '192.168.3.5';

    // Render
    renderCards(asic, gpuData);

    // Nav bar
    const online = (asic.ghsav > 0 ? 1 : 0) + gpuData.filter(g => g.success && g.hashrate > 0).length;
    document.getElementById('navDot').className = 'nav-dot ' + (online >= 2 ? 'online' : 'offline');
    document.getElementById('navWorkers').textContent = online + '/3 online';
    document.getElementById('navAsicHash').textContent = asic.ghsav_display || '--';
    const totalGpuHash = gpuData.reduce((s, g) => s + (g.hashrate || 0), 0);
    document.getElementById('navGpuHash').textContent = totalGpuHash.toFixed(0) + ' MH/s';
    document.getElementById('navTime').textContent = new Date().toLocaleTimeString();

    // Charts
    const ts = new Date().toLocaleTimeString();
    chartsData.labels.push(ts);
    chartsData.asic_hr.push(asic.ghsav || 0);
    chartsData.gpu1_hr.push(gpuData[0]?.hashrate || 0);
    chartsData.gpu2_hr.push(gpuData[1]?.hashrate || 0);
    chartsData.asic_t1.push(asic.temp1);
    chartsData.asic_t2.push(asic.temp2);
    chartsData.gpu1_t.push(gpuData[0]?.temp);
    chartsData.gpu2_t.push(gpuData[1]?.temp);
    chartsData.hw.push(asicHwPerH || 0);
    chartsData.acc.push(asic.accepted || 0);
    chartsData.rej.push(asic.rejected || 0);

    while (chartsData.labels.length > MAX_PTS) {
      Object.keys(chartsData).forEach(k => chartsData[k].shift());
    }

    updateCharts();

    // Syslog
    if (logR.timeline) {
      let logHtml = '';
      for (const e of logR.timeline.slice(0, 40)) {
        logHtml += `<div class="log-line ${e.color}"><span class="log-time">${e.time}</span><span class="log-sev">${e.sev}</span><span class="log-msg">${e.msg}${e.detail ? ' — '+e.detail : ''}</span></div>`;
      }
      document.getElementById('logPanel').innerHTML = logHtml || '<div class="log-line"><span class="text-secondary">No events</span></div>';
      const s = logR.summary || {};
      document.getElementById('logSummary').innerHTML =
        `<div class="sum"><span class="n bad">${s.errors_24h || 0}</span><span class="l">errors</span></div>
         <div class="sum"><span class="n warn">${s.warnings_24h || 0}</span><span class="l">warnings</span></div>
         <div class="sum"><span class="n good">${s.total_events_24h || 0}</span><span class="l">events (24h)</span></div>`;
    }

    // History reload every 30 cycles (~2.5min)
    if (refresh.counter == null) refresh.counter = 0;
    refresh.counter++;
    if (refresh.counter % 30 === 0) loadHistory();

  } catch(e) {
    console.error('Refresh error:', e);
  }
}

function updateCharts() {
  const l = chartsData.labels;
  cHash.data.labels = l;
  cHash.data.datasets[0].data = chartsData.asic_hr;
  cHash.data.datasets[1].data = chartsData.gpu1_hr;
  cHash.data.datasets[2].data = chartsData.gpu2_hr;
  cHash.update('none');

  cTemp.data.labels = l;
  cTemp.data.datasets[0].data = chartsData.asic_t1;
  cTemp.data.datasets[1].data = chartsData.asic_t2;
  cTemp.data.datasets[2].data = chartsData.gpu1_t;
  cTemp.data.datasets[3].data = chartsData.gpu2_t;
  cTemp.update('none');

  cHw.data.labels = l;
  cHw.data.datasets[0].data = chartsData.hw;
  cHw.update('none');

  cShares.data.labels = l;
  cShares.data.datasets[0].data = chartsData.acc;
  cShares.data.datasets[1].data = chartsData.rej;
  cShares.update('none');
}

async function loadHistory() {
  try {
    const r = await fetch('/api/history?hours=' + histRange);
    const j = await r.json();
    const d = j.data || [];
    if (!d.length) return;
    const l = d.map(p => p.timestamp.substring(11, 19));
    cHash.data.labels = l;
    cHash.data.datasets[0].data = d.map(p => p.ghsav || 0);
    cTemp.data.labels = l;
    cTemp.data.datasets[0].data = d.map(p => p.temp1);
    cTemp.data.datasets[1].data = d.map(p => p.temp2);
    cHw.data.labels = l;
    // Calculate HW delta for history
    let lastHwVal = null;
    cHw.data.datasets[0].data = d.map(p => {
      if (p.hw_total == null) return null;
      if (lastHwVal == null) { lastHwVal = p.hw_total; return null; }
      const dh = p.hw_total - lastHwVal;
      lastHwVal = p.hw_total;
      return dh > 0 ? dh : 0;
    });
    cShares.data.labels = l;
    cShares.data.datasets[0].data = d.map(p => p.accepted);
    cShares.data.datasets[1].data = d.map(p => p.rejected);
    cHash.update(); cTemp.update(); cHw.update(); cShares.update();
  } catch(e) {}
}

function formatUptime(s) {
  if (!s || s < 0) return '--';
  const d = Math.floor(s / 86400);
  const h = Math.floor((s % 86400) / 3600);
  const m = Math.floor((s % 3600) / 60);
  if (d > 0) return d + 'd ' + h + 'h';
  if (h > 0) return h + 'h ' + m + 'm';
  return m + 'm ' + (s % 60) + 's';
}

async function gpuAction(idx, action) {
  try {
    const r = await fetch('/api/gpu/' + action + '/' + idx, { method: 'POST' });
    const j = await r.json();
    document.getElementById('logPanel').insertAdjacentHTML('afterbegin',
      `<div class="log-line log-info"><span class="log-time">${new Date().toLocaleTimeString()}</span><span class="log-sev">INFO</span><span class="log-msg">GPU${idx+1}: ${j.message || j.error || action}</span></div>`
    );
    setTimeout(refresh, 3000);
  } catch(e) {
    console.error(e);
  }
}

// Range buttons
document.getElementById('rangeBtns').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  histRange = parseFloat(btn.dataset.h);
  document.querySelectorAll('#rangeBtns button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadHistory();
});

// Start
refresh();
setInterval(refresh, 5000);
loadHistory();
</script>
